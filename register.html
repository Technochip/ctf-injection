<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CTF</title>
    <style>
        :root {
            --bg-color: #F7F4FF;
            --card-bg: #FFFFFF;
            --shadow: 0 2px 12px rgba(160,140,200,0.10);
            --primary: #A78BFA;
            --primary-hover: #7C3AED;
            --secondary: #67E8B0;
            --danger: #FCA5A5;
            --text-primary: #2D2250;
            --text-secondary: #7C6D99;
            --border: #E8E0F8;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .card {
            background: var(--card-bg);
            box-shadow: var(--shadow);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
        }
        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            border-radius: 9999px;
            border: 1.5px solid var(--border);
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input::placeholder {
            color: #B1A7C4;
        }
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        }
        .btn-primary {
            display: inline-block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.2rem;
            border-radius: 9999px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .footer-text a {
            color: var(--primary-hover);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        .divider {
            height: 1px;
            background-color: var(--border);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Create account &#10024;</h1>
        <p class="subtitle">Join us &mdash; it only takes a moment</p>
        <!-- # Logic Point: Form submit triggered client-side via JavaScript event listener -->
        <form id="register-form">
            <div class="input-group">
                <!-- # Logic Point: Input for Name/Username field with id for selection -->
                <input type="text" id="username" placeholder="Your name" required>
            </div>
            <div class="input-group">
                <!-- # Logic Point: Password input field with id for selection -->
                <input type="password" id="password" placeholder="New password" required>
            </div>
            <div class="input-group">
                <!-- # Logic Point: Confirm password input field with id for selection -->
                <input type="password" id="confirm-password" placeholder="Confirm password" required>
            </div>
            <!-- # Logic Point: Submit button triggers the form's submit listener -->
            <button type="submit" class="btn-primary">Register</button>
        </form>
        <div class="divider"></div>
        <!-- # Logic Point: Routing link back to sign-in page (login.html) -->
        <p class="footer-text">Already have an account? <a href="login.html">Sign in &rarr;</a></p>
        <p id="response-msg" style="color:red; margin-top:10px;"></p>
    </div>

    <script>
    document.getElementById('register-form').addEventListener('submit', async (event) => {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
            document.getElementById('response-msg').textContent = "Passwords do not match!";
            return;
        }

        try {
            const response = await fetch('http://localhost:4000/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const responseText = await response.text();

            if (response.ok) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('response-msg').textContent = responseText;
            }
        } catch (error) {
            document.getElementById('response-msg').textContent = error.message;
        }
    });
    </script>
</body>
</html>
